arena:
  # Full path to MTGA.exe
  exe_path: "C:/Program Files/Wizards of the Coast/MTGA/MTGA.exe"
  # If true, the bot launches Arena on startup and kills it on exit.
  # Set to true for scheduled / unattended runs.
  manage_lifecycle: false
  # Seconds to wait for Arena to reach the home screen after launching
  startup_timeout: 120
  # Window title to search for (partial match)
  window_title: "MTGA"
  # Target resolution the bot was calibrated against
  reference_resolution: [2560, 1440]
  # Polling interval in seconds between game state reads
  poll_interval: 0.5
  # How long to wait after clicking before re-polling
  action_delay: 0.8

vision:
  # Minimum confidence for template matches (0-1).
  # Keep high enough that grayed-out/inactive buttons don't match.
  template_threshold: 0.88
  # Minimum confidence for OCR reads
  ocr_confidence: 60
  # Debug: save annotated screenshots each loop iteration
  debug_screenshots: false
  debug_output_dir: "captures/"

engine:
  # Aggression level: controls attack/block decisions (0.0 = conservative, 1.0 = all-in)
  aggression: 0.7
  # If true, pass priority immediately when no action is available
  auto_pass: true
  # Maximum seconds to hold priority before auto-passing
  priority_timeout: 5.0

navigation:
  # Deck name to select in the Bot Match deck picker (must match Arena's deck list exactly)
  deck_name: "Izzet Lessons"
  # Fractional [x, y] position of the first deck entry in the deck selection list.
  # Adjust if Izzet Lessons is not the first/top deck shown.
  deck_list_position: [0.22, 0.27]
  # Seconds to wait after each menu click before looking for the next button
  nav_click_delay: 1.5
  # How many times to retry finding a nav button before giving up
  max_retries: 3
  # Seconds to wait for the mulligan screen after clicking Submit
  game_start_timeout: 30

deck:
  # Path to the active deck file
  active: "decks/active_deck.yaml"

layout:
  # Fractional positions (0-1) of Arena UI zones.
  # Calibrated for 2560x1440 and 1920x1080 (same fractions).
  # Adjust here if cards are being clicked in the wrong spot.
  hand_y: 0.905
  hand_x_min: 0.175
  hand_x_max: 0.825
  our_creatures_y: 0.615
  our_creatures_x_min: 0.12
  our_creatures_x_max: 0.88
  our_lands_y: 0.725
  our_lands_x_min: 0.12
  our_lands_x_max: 0.88
  opp_creatures_y: 0.385
  opp_creatures_x_min: 0.12
  opp_creatures_x_max: 0.88
  opp_player_x: 0.5
  opp_player_y: 0.06

logging:
  level: "INFO"
  file: "logs/bot.log"
  rotation: "10 MB"
